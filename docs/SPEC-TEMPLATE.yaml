# ---------------------------------------------------------------------------
# Paperworlds — Spec Format Template
#
# Every feature or bugfix that goes through a prompt agent uses this format.
# One file per spec. All four sections (metadata, requirements, design, tasks)
# live here. YAML over markdown — structured, parseable, diffable.
#
# ROLES
#   LEAD   — the human (or orchestrator) who writes and owns the spec.
#            The LEAD sets requirements, approves design, and marks tasks done.
#   AGENT  — the implementing Claude session. Reads everything, touches only
#            its own code and logs. Never modifies status fields.
#
# LIFECYCLE
#   draft      → LEAD writes explore: unknowns, leaves requirements/design thin
#   exploring  → a discovery AGENT reads codebase and fills in explore: answers
#   specced    → LEAD reviews answers, hardens requirements + design, removes explore:
#   active     → implementation AGENT works through tasks in order
#   done       → all tasks marked done by LEAD
#
# When all unknowns are already resolved, skip explore: entirely and go straight
# to requirements + design. Not every spec needs a discovery phase.
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# METADATA
# ---------------------------------------------------------------------------

id: "NNN"                     # three-digit prompt number, unique per repo
title: "Short feature title"
repo: textworkspace           # which repo this runs in
model: sonnet                 # claude model: sonnet | opus | haiku
phase: textworkspace          # logical phase label (matches repo or epic)
budget_usd: 2.00              # max spend for this agent session
depends_on: []                # ids that must be done first, e.g. ["005", "007"]

# ---------------------------------------------------------------------------
# EXPLORE  (optional — remove once specced)
#
# Used when the LEAD has open questions before requirements can be written.
# A lightweight discovery AGENT answers the unknowns by reading the codebase,
# running commands, or checking docs. The LEAD then uses those answers to
# harden requirements: and design:, then removes this section.
#
# The discovery agent:
#   - fills in answer: fields in place
#   - appends to findings: with anything surprising
#   - does NOT write code or modify any files outside this spec
#
# answers: and findings: are the only fields the discovery agent may write.
# ---------------------------------------------------------------------------

explore:
  unknowns:
    - id: U01
      question: "<specific yes/no or factual question about the codebase>"
      answer: ""   # discovery agent fills in

    - id: U02
      question: "<another question — CLI flags, existing behaviour, file format, etc.>"
      answer: ""   # discovery agent fills in

  findings: |
    # discovery agent appends here — anything surprising not captured in answers

# ---------------------------------------------------------------------------
# REQUIREMENTS
#
# EARS notation: WHEN [triggering condition] THE SYSTEM SHALL [expected behavior]
#
# Rules:
# - Every requirement must be independently testable.
# - No ambiguous words: "should", "gracefully", "appropriately" are banned.
# - Each requirement maps to ≥1 task via satisfies: [RXX].
# - Add a note: field for context that doesn't fit the SHALL statement.
# ---------------------------------------------------------------------------

requirements:
  - id: R01
    when: "<triggering condition — user action, system event, or data state>"
    shall: "<observable, unambiguous system behavior>"
    # note: "optional — cross-references, edge cases, rationale"

  - id: R02
    when: "<another condition>"
    shall: "<another behavior>"

  # Error / degradation requirements follow the same pattern:
  - id: R03
    when: "<condition that could fail>"
    shall: "print [WARN] <message> and skip <action> without aborting"

# ---------------------------------------------------------------------------
# DESIGN
#
# The LEAD writes this before the agent starts. The agent MUST NOT deviate
# from the design without flagging it in the progress log.
#
# Sections to include (omit if not applicable):
#   overview        — one paragraph: what, why, key constraints
#   modules         — files touched/created, one line role each
#   data_structures — dataclasses, schemas, invariants
#   config_schema   — YAML example of new config keys (literal block)
#   sequence        — numbered step-by-step for each non-trivial flow
#   degradation     — failure handling pattern, copy-paste ready
# ---------------------------------------------------------------------------

design:
  overview: |
    One paragraph. State what is being built, why it belongs here,
    and any architectural constraints the agent must respect.

  modules:
    - path: src/<package>/new_module.py
      role: "New file. What it owns."
    - path: src/<package>/existing.py
      role: "Extended. What changes."

  data_structures:
    ExampleConfig:
      fields:
        name: "str  # required"
        value: "int  # optional, default 0"
      invariant: "name must be non-empty — validated at load time (R01)"

  config_schema: |
    # Literal YAML example of any new config keys added to config.yaml
    new_section:
      key: value

  sequence:
    main_flow: |
      1. step one  (RXX: what requirement this satisfies)
      2. step two
      3. step three

  degradation:
    principle: "One sentence on the failure philosophy."
    pattern: |
      try:
          subprocess.run([bin, *args], check=True)
      except FileNotFoundError:
          click.echo(f"[WARN] {tool} not found — skipping", err=True)
      except subprocess.CalledProcessError as e:
          click.echo(f"[WARN] {tool} failed ({e.returncode}) — skipping", err=True)

# ---------------------------------------------------------------------------
# TASKS
#
# Ordered implementation steps. Each task:
#   - mode:       explore | implement (default: implement)
#                 explore  → agent has latitude to investigate and propose;
#                            writes findings to the progress log, not code
#                 implement → agent follows spec exactly; no latitude
#   - satisfies:  links back to requirement ids (empty for infra tasks)
#   - do:         instructions to the agent — concrete, not vague
#   - check:      EARS statements the agent verifies before marking done
#   - checkpoint: if true, agent must STOP after this task and wait for
#                 LEAD review before continuing. Used after explore tasks
#                 or at design decision points.
#   - status:     LEAD-only — agent must NOT modify this field
#
# status values: pending | done
# The LEAD sets done after reviewing the output, not the agent.
#
# Typical task order:
#   [optional] T00 explore — discovery tasks with checkpoint: true
#   T01..TN-2  implement   — one logical unit per task, commit after each
#   TN-1       tests       — covers all Rs in satisfies
#   TN         commit      — final commit message
# ---------------------------------------------------------------------------

tasks:
  # -- optional: discovery before implementation --
  - id: T00
    name: explore-<slug>
    mode: explore          # reads code, does not write it
    satisfies: []
    status: pending  # LEAD only
    checkpoint: true       # STOP here — LEAD reviews before T01 starts
    do: |
      Read <files or modules>. Answer:
      - Does X already exist, or must it be created?
      - What does Y's current interface look like?
      Log findings to the progress log. Do not write any code.
    check:
      - "WHEN the progress log is read, THE SYSTEM SHALL contain a clear answer to each question above"

  # -- implementation tasks --
  - id: T01
    name: short-slug
    mode: implement
    satisfies: [R01, R02]
    status: pending  # LEAD only
    do: |
      Concrete implementation instructions.
      Reference design.data_structures and design.sequence by name.
      One logical unit of work per task — commit after each.
    check:
      - "WHEN <condition>, THE SYSTEM SHALL <observable outcome>"
      - "WHEN <another condition>, THE SYSTEM SHALL <another outcome>"

  - id: T02
    name: tests
    mode: implement
    satisfies: [R01, R02, R03]   # list all requirements covered by tests
    status: pending  # LEAD only
    do: |
      Tests in tests/test_<module>.py.
      Use tmp_path fixtures — no writes to real config dirs.
      One test function per requirement. Name: test_<rid>_<slug>.
    check:
      - "WHEN pytest tests/test_<module>.py -v is run, THE SYSTEM SHALL report all tests passing with zero failures"

  - id: T03
    name: commit
    mode: implement
    satisfies: []
    status: pending  # LEAD only
    do: "Commit: '<type>: <short description>'"
    check:
      - "WHEN git log --oneline -1 is run, THE SYSTEM SHALL show the commit"
