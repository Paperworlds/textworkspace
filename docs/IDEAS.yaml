# textworkspace — Ideas Backlog
# Ordered by priority within each category

brainstorm:
  - name: interactive-personas
    title: Interactive personas — inbox/review loops driven from the current session
    priority: 1
    status: brainstorm
    date: "2026-04-24"
    description: >
      idea-expander nails the standalone/ephemeral persona shape: fire-and-forget
      worker with bounded budget, output as a forum thread. But some reviews
      are inherently interactive — they need to read a small backlog, surface
      one item at a time, and wait for the user to accept/edit/skip. Those
      shouldn't be spawned as isolated subprocesses. They should run as
      *inline personas* within the current Claude session, using its memory
      and prompt continuity. Two concrete candidates:
    candidates:
      - id: idea-inbox-validator
        goal: >
          Walk `tw ideas list` and interactively flag malformed entries,
          stale brainstorm items, duplicates, or ideas that already have a
          decided thread (→ close the idea). User says keep/fix/drop for
          each.
        wiring_sketch:
          - "pp persona run idea-inbox-validator   (interactive=true)"
          - "persona prompt: for each idea in tw ideas list --status brainstorm, present summary + decision threads + age, then WAIT for user input."
          - "no budget cap — it's the user's time, not tokens, that bounds the run."
      - id: textmap-inbox-reviewer
        goal: >
          Walk textmap's 'proposed' inbox (nodes suggested via propose_node
          that haven't been accepted into the graph yet). Present each with
          context (type, connections, source), user says accept/reject/edit.
          Arguably MORE important than the idea inbox — the graph only stays
          useful if the inbox drains.
        wiring_sketch:
          - "pp persona run textmap-inbox-reviewer   (interactive=true)"
          - "tool scope: textmap MCP (query_node, expand, propose_node, and future accept_proposal)"
          - "prompt: for each proposed node, surface neighbors + existing similar nodes, wait for user verdict."
    distinction_from_idea_expander:
      - "idea-expander: standalone, isolated subprocess, outputs a thread, no live user."
      - "interactive personas: run in the live session, persona is the *prompt shape*, tool scope + system prompt, but no subprocess spawn."
    open_questions:
      - "Does pp persona run grow an --interactive flag that skips the subprocess spawn and instead injects the persona system prompt into the current REPL turn? Or is this a separate command: tw persona use <name>?"
      - "How does budget work for interactive? Probably: budget_usd: null + max_turns: null (user bounded)."
      - "Does the persona ship in textprompts/personas/ alongside idea-expander, or is an interactive persona a different artifact altogether?"
    relation_to_other_ideas:
      - "Expands SPEC: idea-expander (owner textprompts) with a second mode: interactive."
      - "textmap-inbox-reviewer is pre-req for the 'ingest forum decisions' loop to stay healthy — bad proposals need a human gate."

  - name: extract-textforums-repo
    title: Extract textforums into its own repo (textforums)
    priority: 1
    status: brainstorm
    date: "2026-04-24"
    description: >
      textforums has grown past 'small helper'. It now has its own data model
      (ThreadMeta, Entry, Thread, ThreadLink, ThreadContext), lifecycle
      commands (new/add/edit/close/reopen/bulk-close), querying
      (list/search/tags), maintenance (doctor/migrate-context), and a
      dedicated spec subsystem (forums spec new/show/check/adopt/supersede/
      brief/explain/refs). Living inside textworkspace is starting to feel
      accidental — the spec + forum loop is the cross-repo communication
      layer, not a workspace utility.
    why:
      - "Separation of concerns: textworkspace is a meta-CLI and package manager; textforums is a cross-repo coordination protocol."
      - "Clearer dependency graph — other repos can depend on textforums without pulling in all of textworkspace."
      - "Versioning the protocol independently: the spec format can bump without churning textworkspace releases."
      - "Makes it easier to wrap textforums as an MCP server later (agent-native integration)."
    risks:
      - "Migration churn: tw forums passthrough stays, but internal callers (doctor, specs.py) need to import from the new package."
      - "Duplicate YAML/dataclass machinery if we don't factor a shared textforums.api."
      - "Versioning lag between repos — needs a spec (eat our own dogfood)."
    proposed_split:
      - "textforums/  — library + CLI, owns ThreadMeta/Entry/Context, list/new/add/edit/close/search/tags/doctor/migrate-context."
      - "textworkspace/ — keeps the tw forums passthrough group; depends on textforums."
      - "Spec subsystem (forums spec *) moves to textforums — it's fundamentally a forum feature that happens to reference source code."
    open_questions:
      - "Does spec check (which walks dev_root) belong in textforums or stay in textworkspace?"
      - "Do we publish textforums to PyPI, or keep it github-install like the rest of the stack?"
      - "Should the first spec authored in textforums be the textforums protocol itself (api, ThreadMeta shape)?"

  - name: pp-forums-integration
    title: pp uses textforums as the lead↔worker communication channel
    priority: 1
    status: brainstorm
    date: "2026-04-24"
    description: >
      textprompts (pp) currently coordinates between LEAD (spec author) and
      WORKER (claude -p session) via filesystem artifacts: prompts/, logs/,
      reports/, .state. textforums primitives (context.repos/to/spec,
      decide, --format prompt, inbox) now cover the same shape — but add
      cross-worker awareness, durable handoffs, and human drop-in mid-run.
      The playbook YAML stays as the contract; the thread is the runtime trace.
    mapping:
      - "prompts/NNN-slug.yaml              → spec (or a reference to one)"
      - "pp run NNN (spawns worker)         → thread with --to worker-NNN --spec <slug> --commit <HEAD>"
      - "progress.log (per-step append)     → textforums add <thread> --content \"STEP N: ... — PASS\""
      - "reports/NNN-slug.report.md         → textforums decide <thread> --summary \"...\""
      - ".state (DONE|PARTIAL|BLOCKED)      → status=decided (DONE) / status=open (PARTIAL/BLOCKED)"
      - "LEAD reads reports                 → tw forums inbox --repo <repo> --as lead"
      - "Worker hits blocker                → textforums new --to <other-repo> --mention lead"
    what_forums_adds:
      - "Cross-worker awareness: worker 003 sees what 002 did on the same spec."
      - "Blocker routing: a cross-repo block lands in both repos' inboxes."
      - "Durable handoffs: next session reads tw forums decisions --since <date> instead of parsing logs."
      - "Human entry point: LEAD can add context mid-run without re-parsing the spec."
    what_forums_does_not_replace:
      - "The playbook YAML — spec is the contract, thread is the trace."
      - "High-frequency per-step output (test output, grep results): still in logs/."
      - "Budget/model selection: pp decides that."
    shape_of_change:
      pp_side:
        - "On pp run: open a thread with context.to=worker-NNN, spec=<slug>, commit=HEAD, repos=[<repo>]."
        - "Each step logged via textforums add."
        - "On completion: textforums decide (DONE) or final [BLOCKED]/[PARTIAL] entry with status=open."
        - "On start: inject thread history into worker context — tw forums inbox --format prompt already does this."
      config: >
        pipeline.yaml gains forums_channel: true (opt-in). Existing file-based
        flow stays as the default path; forums integration is additive.
    open_question: >
      Do worker entries go in the playbook's own thread (readable narrative,
      but polluted by retries) or in a companion child thread linked with
      rel: run-of (cleaner separation; parent is 'what we decided to do',
      child is 'how run #3 went')? Lean: companion. Parent is long-lived
      'decisions ledger', run threads can be GC'd after retention window.
    relation_to_other_ideas:
      - "Expands pp-context-injection (under forums-agent-integration) from 'read-only' to 'read+write'."
      - "The pp→textmap protocol nodes idea is downstream: once pp emits thread events, textmap can ingest them as decision/protocol nodes."
      - "Relies on pins+decisions (PLAN-pins-decisions.md) — workers need status=decided for the handoff to be canonical."
    concrete_mvp:
      title: "sub-agent spec with forums as the lead↔worker wire"
      why: >
        Best test bed for the 0.11.0 API (pins + decisions + --profile inbox):
        a pp spec about running a sub-agent that speaks to its lead via a
        textforum thread in the spec's target repo. Gives us an end-to-end
        loop — LEAD pins the thread on open, worker appends step entries,
        worker (or LEAD on success) marks decide, subsequent runs read via
        `tw forums inbox --as worker-NNN --format prompt`.
      spec_lives: textprompts/docs/specs/sub-agent-forums.md (to be written)
      target_repo: configurable per run; default is the spec's repo
      minimum_surface_used:
        - "textforums new --repo <target> --to worker-NNN --spec <slug> --pin"
        - "textforums add <slug> --content \"STEP N: … — PASS\""
        - "textforums decide <slug> --summary \"<outcome>\""
        - "tw forums inbox --repo <target> --as worker-NNN --format prompt   # for re-entry"
      success_signal: >
        A run can be resumed in a fresh session purely by reading the thread
        (no log files consulted). If that works, pp-forums-integration graduates
        from brainstorm to implementation.

  - name: forums-agent-integration
    title: Enforce forums usage in agent sessions
    priority: 1
    status: brainstorm
    date: "2026-04-14"
    description: >
      How do we make agents actually use textforums for cross-repo coordination
      instead of just logging BLOCKED? Five ideas, layered from convention to enforcement.
    ideas:
      - name: read-on-start
        description: >
          Agent checks forums at session begin. Add to prompt template or CLAUDE.md:
          "Before starting work, run textforums list --tag <your-repo> and check
          for threads relevant to your task." Lightweight, no enforcement.
        effort: low
        enforcement: none

      - name: write-on-block
        description: >
          When an agent hits a cross-repo dependency, it posts a forum thread
          (textforums new --tag <target-repo>) instead of just logging BLOCKED.
          The next agent on that repo picks it up via read-on-start.
        effort: low
        enforcement: convention

      - name: pp-context-injection
        description: >
          pp run auto-prepends relevant open forum threads to the prompt context
          before spawning the worker. Runs textforums list --tag <repo> --status open,
          formats output, appends to prompt. Agents can't skip what's in their context.
        effort: medium
        enforcement: automatic

      - name: pp-post-task-scan
        description: >
          After a task completes, pp checks if the worker created any new forum
          threads (new files in ~/.textforums/ since task start). Flags them in
          notification and progress log. Surfaces cross-repo requests to the lead.
        effort: medium
        enforcement: visibility

      - name: forums-as-dependency
        description: >
          A forum thread tagged "blocks:003" blocks a prompt from running until
          the thread is resolved. pp run checks for blocking threads before spawning.
          Hard enforcement — the DAG won't proceed until coordination is done.
        effort: high
        enforcement: hard

    recommendation: >
      Start with read-on-start + write-on-block as conventions. Then build
      pp-context-injection as the real enforcement layer. Post-task scan and
      dependency blocking are follow-ups once the pattern is validated.

  - name: forums-showcase
    title: Promote forum findings into the knowledge graph
    priority: 2
    status: brainstorm
    date: "2026-04-17"
    description: >
      Forums capture messy, time-ordered discussion between sessions and humans.
      Over weeks, patterns and resolved answers emerge — but they stay buried
      inside thread files. Showcase is the promotion layer: curated findings
      are marked as knowledge and exported to textmap as structured, citable
      nodes. This closes the loop between discussion and canonical knowledge.
    flywheel:
      - stage: discuss
        tool: textforums
        description: Sessions and humans post threads, exchange context, resolve blockers.
      - stage: showcase
        tool: "textforums (showcase feature)"
        description: >
          A curator (human or agent) marks a thread — or a specific entry within
          a thread — as worth graduating to knowledge.
      - stage: know
        tool: textmap
        description: >
          Showcased content becomes a node in the graph — queryable, tagged,
          citable. Source thread linked as provenance. Feeds future session context.
      - stage: discover
        tool: "(agent sessions)"
        description: >
          Next session reads the map (read-on-start analogue), references the
          knowledge, generates new discussion. Loop continues.
    why: >
      Without a promotion layer, lived experience stays buried in chronological
      forum threads. The map only grows from explicit curation work, so agents
      rediscover the same patterns over and over. Showcase makes the flywheel
      close — forums become a source, not a dead letter office.
    mechanics:
      - An entry within a thread, or an entire thread, can carry `showcased: true`.
      - "`textforums showcase list` — pinned view of all promoted threads."
      - "`textforums promote <slug> [--entry N] [--summary ...]` — elevate to knowledge."
      - "Promotion writes a node to textmap: summary + tags + source thread reference."
      - "Demote is allowed — knowledge can be un-promoted if it turns out wrong or stale."
      - "Promoted content keeps a backlink to the original thread for provenance."
    curation_models:
      - name: human
        description: Curator (Paul) decides what graduates. Simplest, best to start.
      - name: agent-assisted
        description: >
          An agent scans closed threads, proposes promotions with a draft summary.
          Human confirms or rejects. Reduces curation friction without giving up control.
      - name: automatic
        description: >
          Threads with `status=resolved` and a specific tag (e.g. `pattern`,
          `decision`) auto-promote. Cheapest, but risks low-quality knowledge.
    open_questions:
      - How does textmap ingest promoted content — file drop, API call, or CLI command?
      - Is a promoted summary editable in the map, or always derived from the source thread?
      - One thread → one node, or can one node merge findings from multiple threads?
      - Who writes the summary — the curator, or is it the thread's last entry?
      - Versioning — if a thread gets a new entry post-promotion, does the node update?
    relation_to_forums_agent_integration: >
      `forums-agent-integration` handles data going IN (agents posting threads when
      blocked). `forums-showcase` handles value coming OUT (findings becoming
      durable knowledge). Both are needed for the flywheel to turn. This one
      depends on textmap existing as a promotion target.
    blockers:
      - textmap must exist with a writable ingestion path.
      - Decide on a canonical summary format (markdown node, YAML record, both).

  - name: forums-textmap-native
    title: Native dual-write — every forum operation also writes to the graph
    priority: 1
    status: brainstorm
    date: "2026-04-18"
    description: >
      Stronger than showcase (opt-in promotion). Every textforums write is also
      a textmap write — not as a side-effect or cron job, but as the primary
      operation. The YAML file and the graph node are co-equal representations
      of the same thing. forums-showcase becomes a higher-level view on top
      of what's already in the graph.
    model: >
      textforums is the write surface (human-friendly, CLI). textmap is the
      query surface (graph traversal, structural queries). Same data, two
      projections. Neither is the "real" store — both are updated atomically.
    operations:
      new: >
        textforums new → write thread.yaml AND upsert Thread node in graph
        (slug, title, status=open, tags as edges, created_at).
      add: >
        textforums add → append to thread.yaml AND append Entry node linked
        to Thread (author, content, status, timestamp).
      close: >
        textforums close → update thread.yaml status AND update Thread node
        status=resolved, resolved_at. Graph queries can filter resolved threads.
      reopen: >
        textforums reopen → update both. Graph node status=open, resolved_at cleared.
    graph_schema:
      nodes:
        Thread: [slug, title, status, tags, created_at, resolved_at]
        Entry: [author, content, status_change, timestamp]
      edges:
        - Thread -[HAS_ENTRY]-> Entry
        - Thread -[TAGGED]-> Tag
        - Thread -[BLOCKS]-> Prompt   # for forums-as-dependency
        - Thread -[CONCERNS]-> Repo   # derived from tags
    query_power: >
      With threads in the graph, you can ask: "what threads concern textserve
      AND are open AND were created in the last 7 days?" as a graph traversal
      rather than file-glob + YAML parse. Cross-repo blockers become first-class
      edges. pp context injection becomes a graph query, not a tag filter.
    relation_to_showcase: >
      forums-showcase (promote selected threads to knowledge nodes) still makes
      sense on top of this — it's the step where a Thread node gets promoted
      to a KnowledgeNode with a curated summary. Native dual-write just means
      ALL threads are in the graph from day one, not only promoted ones.
    implementation_approach: >
      textforums gets an optional textmap client (graphk CLI call or SDK).
      If textmap is not installed/reachable, textforums degrades gracefully —
      writes YAML, logs a warning, continues. No hard dependency.
      textmap sync command can backfill from existing thread.yaml files.
    open_questions:
      - Atomic write or best-effort? If graph write fails, is the thread still created?
      - Does textmap need a stable schema for Thread/Entry nodes before this lands?
      - Backfill command — textmap sync --from-forums to ingest existing threads?
      - Should textmap be the authority (YAML derived from graph) or co-equal?
    blockers:
      - textmap must have a stable Node schema and writable CLI interface.
      - graphk CLI (or equivalent) must be on PATH or the integration is no-op.

observability:
  - name: textctx
    title: Context window curator
    priority: 1
    status: idea
    description: >
      What goes into Claude's context per session, per repo, per task.
      Curated .context files, smart truncation, relevance scoring.
      Context management is completely unsolved right now.
    references:
      - title: Caveman — token reduction via terse prompting
        url: https://github.com/JuliusBrussee/caveman
        note: 65-75% output token savings. Our pp already has terse mode — validates going further.
      - title: recursive-mode — file-based phase management
        url: https://recursive-mode.dev/introduction
        note: Externalized state (STATE.md, DECISIONS.md) is a form of context curation across sessions.

  - name: textaudit
    title: Immutable audit trail
    priority: 2
    status: idea
    description: >
      All Claude Code actions across all sessions. What was asked, what was
      changed, which files were touched, cost per action. Compliance-adjacent,
      pairs naturally with textproxy.

workspace_profiles:
  - name: tw-workspaces
    title: Workspace profiles — join accounts + servers + project into one unit
    priority: 1
    status: specced          # full impl spec in prompts/010-workspace-profiles.yaml
    date: "2026-04-15"
    description: >
      A `workspace` is a named config that joins three independent axes:
      profile (textaccounts), servers (textserve tags or names), and project
      (dir for textsessions tagging). `tw start <workspace>` replaces the
      manual 3-step: accounts switch + mcpf start + textsessions new.
      Workspaces live in config.yaml under a `workspaces:` key.
    why: >
      The `go` combo does this today but requires args every time and has
      no named defaults. Workspaces make intent explicit and reusable.
      Also unblocks proper textserve integration once CLAUDE_CONFIG_DIR
      propagation is confirmed.
    relation_to_go_combo: >
      `tw go <profile> <repo>` is the current workaround. Workspaces
      supersede it — `tw start data` is the same idea but config-driven
      and aware of multiple axes. The `go` combo can delegate to `tw start`
      once workspaces land.
    key_design_points:
      - "Workspaces are the JOIN of tools, not a merger — profile and server-sets stay independent so you can reuse them in different combinations."
      - "CLAUDE_CONFIG_DIR must be set in env before shelling out to mcpf so server registration hits the right profile's claude.json."
      - "State written to ~/.config/paperworlds/state.yaml: active_workspace + started_at."
      - "Graceful degradation: each tool (textaccounts, textserve, textsessions) is optional — missing tools warn and skip, they don't abort."
    cli:
      - "tw start <workspace>  — switch + start servers + new session"
      - "tw stop <workspace>   — stop servers (don't switch profile back)"
      - "tw workspaces list    — show all defined workspaces"
      - "tw workspaces status  — active workspace + server/session state"
      - "tw workspaces add     — interactive scaffold"
      - "tw workspaces edit    — open config.yaml in $EDITOR"
    example_config: |
      workspaces:
        data:
          description: "Data work — Snowflake, Airflow"
          profile: work
          servers:
            tags: [data]
          project: ~/projects/personal/data-work
        personal:
          description: "Personal hacking"
          profile: personal
          servers:
            names: [snowflake]
          project: ~/projects/personal
    blockers:
      - textserve (mcpf) must read CLAUDE_CONFIG_DIR for registration — one-line
        fix in internal/claude/claude.go configPath(). tw start works around
        this by injecting CLAUDE_CONFIG_DIR into subprocess env.
    files:
      - src/textworkspace/workspace.py  (new)
      - src/textworkspace/config.py     (extend with workspaces: key)
      - src/textworkspace/cli.py        (tw start, tw stop, tw workspaces group)

spec_format:
  - name: spec-template
    title: Unified spec format — requirements, design, tasks, explore in one YAML
    priority: 1
    status: done
    date: "2026-04-16"
    spec: docs/SPEC-TEMPLATE.yaml
    description: >
      Single-file spec format combining EARS requirements, design, and ordered tasks.
      Includes an optional explore: phase for discovery before implementation locks in.
      See docs/SPEC-TEMPLATE.yaml for the canonical template and
      prompts/010-workspace-profiles.yaml for a worked example.

developer_workflow:
  - name: textread
    title: Context-aware link reader
    priority: 1
    status: idea
    date: "2026-04-18"
    description: >
      CLI that takes a URL (article, PDF, video transcript, repo README),
      fetches it, and evaluates relevance against a stored user context
      ("I am a developer working on Paperworlds — a text-based multiplayer
      RPG plus AI dev tooling stack"). Output: a worth-reading verdict plus
      a summary through the lens of what YOU are building. Separate repo,
      small scope, useful on day one.
    why: >
      The volume of AI/dev news is overwhelming; most articles are noise
      relative to what you're actually shipping. A reader that knows your
      current projects can filter the feed and surface only what connects
      to real work. Cheaper attention, faster validation loops.
    usage:
      - "textread <url|path> — fetch or read local file, assess, summarize through saved context."
      - "textread <url|path> --context <override> — one-off context override."
      - "textread context edit — update the stored user profile / project list."
      - "textread <url|path> --save — append to reading log; prompt for bookmark."
      - "textread bookmark <url|path> --stars 4 --label ai,tooling — save rated bookmark."
      - "textread bookmarks [--label ai] [--min-stars 3] — list bookmarks filtered."
      - "textread convert <path> — convert PDF/DOC/XLSX/PPTX to cleaned markdown."
      - "textread remap <url|path> — re-run agent on cached raw with current context."

    format_support:
      auto_detect: >
        Input can be a URL, a local file path, or a directory of files.
        Format is detected from mime type / extension: .html, .pdf, .docx, .xlsx,
        .pptx, .txt, .md. Unknown types fall back to raw text extraction.
      conversion:
        command: "textread convert <path|url>"
        purpose: >
          Standalone conversion to cleaned markdown. No agent call — pure extraction.
          Useful for archiving reference docs and feeding them into other tools.
        formats:
          pdf: pdfminer.six or pymupdf — strip headers, footers, page numbers.
          docx: python-docx — preserve headings, tables as md tables.
          xlsx: openpyxl — sheet → md table, one sheet per heading.
          pptx: python-pptx — slide title + bullet text, notes if present.
          html: newspaper4k / readability-lxml — main content only.
        output: >
          Writes <name>.md alongside raw file in cache. This is the token-efficient
          version sent to the agent — not the raw binary.
      storage_tiers: |
        raw.<ext>         # original binary — archived once, never sent to LLM
        raw.md            # cleaned markdown — what the agent actually sees
        raw.meta.json     # url/path, fetched_at, content-type, format, size
        mapping.yaml      # verdict + summary — regeneratable from raw.md

    bookmarks:
      purpose: >
        Persistent rated reference layer. A bookmark is a saved read with a star rating
        (1–5) and one or more labels. Labels build a preference map over time:
        what subjects consistently earn 4–5 stars reveals the user's actual interests,
        which can feedback into read-context.yaml to improve future verdicts.
      storage: ~/.textread/bookmarks.yaml
      schema: |
        - url: https://example.com/article
          path: null             # set if local file
          title: "Article title"
          stars: 4              # 1 (meh) to 5 (essential)
          labels: [ai, tooling, mcp]
          bookmarked_at: "2026-04-18T10:00:00Z"
          mapping_path: ~/.textread/cache/<slug>/mapping.yaml
          note: "optional freeform annotation"
      preference_map: >
        Future: aggregate bookmarks by label → compute avg stars per label →
        surface as user preference signal. High-star labels can be injected into
        read-context.yaml automatically or on request ("textread context sync-prefs").
        This closes the loop: reads shape context, context shapes verdicts.
      commands:
        - "textread bookmark <url|path> --stars N --label l1,l2 [--note '...']"
        - "textread bookmarks [--label <l>] [--min-stars N] [--sort stars|date]"
        - "textread bookmark remove <url|path>"
        - "textread bookmarks export --format md   # readable digest"
    context_model:
      stored_at: ~/.config/paperworlds/read-context.yaml
      contents:
        - Who you are (role, stack, interests).
        - Projects you're working on (names, goals, current blockers).
        - Filters (topics to downweight or ignore).
    integration_ideas:
      - Feeds IDEAS.yaml — high-relevance articles auto-suggest a references entry under the matching project.
      - Pair with Arc folder exports for batch evaluation of a reading list.
      - Exposed as a Claude Code slash-command or subagent for interactive reads.
    execution_model:
      runtime: >
        Each read runs as a fresh subagent invocation (clean context) so cost
        stays predictable and the main session's context window isn't polluted
        by page contents. The subagent gets: URL + fetched content + stored
        user context + output schema. It returns a structured verdict.
      synchronous: >
        Sync only. No async, no background jobs — keep it simple. If the fetch
        is slow, the CLI blocks. Acceptable trade-off at v1.
      model:
        default: haiku
        override: "--model <alias>  (e.g. sonnet for long-form PDFs or nuanced takes)"
        provider: Claude only for now — uses the Anthropic SDK / Claude API directly.
          No multi-provider abstraction at v1; keep the surface small.
      cost_target: A typical read should be cents, not dollars. Haiku default
        keeps it cheap enough to run opportunistically on every shared link.
    storage_model:
      approach: >
        Two-tier: raw content on disk as the durable archive, YAML mapping as
        the structured interpretation. Raw is fetched ONCE per URL. Mapping
        can be regenerated cheaply by re-running the agent against cached raw
        with updated context — no re-fetch needed.
      cache_root: >
        Home-space, path configurable via config (default ~/.textread/cache/).
        Config key lives under textread in ~/.config/paperworlds/config.yaml
        or a dedicated ~/.config/paperworlds/textread.yaml.
      layout: |
        ~/.textread/cache/<slug-or-hash>/
          raw.<ext>        # original binary — archived once, never sent to LLM
          raw.md           # cleaned markdown — token-efficient form sent to agent
          raw.meta.json    # url/path, fetched_at, content-type, format, final-url
          mapping.yaml     # structured verdict + extract — the smart part
      re_mapping: >
        "textread remap <url>" re-runs the agent on cached raw with the
        current context. Useful when projects or interests change — you can
        re-evaluate old reads without spending new fetch budget.
      feeds_textmap: >
        Future integration. textmap doesn't exist yet, so v1 ships without
        it — mappings stay local. Once textmap lands, mapping.yaml becomes
        the bridge: promoted reads (or ones crossing a relevance threshold)
        become nodes in the graph. Raw stays local — textmap gets the
        interpretation, not the archive. Designed with the bridge in mind
        so the shape of mapping.yaml is textmap-compatible from day one.
    fetch_strategy:
      principles:
        - Respect robots.txt — never fetch blocked paths.
        - Identify with a proper User-Agent.
        - Fetch once per URL (until explicit refresh).
      library: newspaper
      library_url: https://github.com/AndyTheFactory/newspaper4k
      note: >
        newspaper4k is the maintained community fork of newspaper3k — worth
        watching (no stable commitment yet). Start with it; if it proves
        flaky, fall back to readability-lxml or a manual
        urllib.robotparser + httpx combo.
    open_questions:
      - Output shape — terse verdict by default, optional deep summary on flag?
      - Cache invalidation — does anything auto-expire, or only manual refresh? Leaning manual only.
      - Slug vs hash for cache key — human-readable is nicer but collisions hurt. Maybe slug + 6-char hash suffix.
      - Subagent invocation path — Anthropic SDK direct (simpler, cheaper) vs Claude Code Agent SDK. Leaning direct.
      - YouTube transcripts, paywalled content — explicitly out of scope for v1; note in README.
      - Bookmark label taxonomy — freeform vs a curated set? Freeform for now, curated later via preference map.
      - preference_map sync cadence — manual ("sync-prefs") or auto on every 5th bookmark?

  - name: texthook
    title: Git hooks integration
    priority: 3
    status: idea
    description: >
      Pre-commit AI review, auto-summarize diffs for commit messages, flag
      risky changes before they land. Lives at the intersection of Claude Code
      and the normal dev workflow.
    references:
      - title: Datadog Code Security MCP
        url: https://www.datadoghq.com/blog/introducing-datadog-code-security-mcp/
        note: MCP server for SAST/SCA/secrets/IaC. Could pair with texthook for pre-commit security scanning.

  - name: textwatch
    title: Standalone filesystem watcher daemon — superset of the pp daemon
    priority: 2
    status: brainstorm
    date: "2026-04-18"
    description: >
      Rule-based, standalone background daemon. Watches configured paths for
      filesystem events and fires actions (notify, trigger, log) when patterns
      match. Generalizes and replaces the pp daemon currently baked into
      textprompts — that daemon's behavior becomes a built-in rule set.
      Separate repo (paperworlds/textwatch), managed via textworkspace like
      textproxy (tw watch start/stop/status/log).
    why: >
      The pp daemon (textprompts/daemon.py) already does polling, PID management,
      lock files, double-fork, discovery, health, and notification — but it is
      hardcoded to textprompts concepts (pipeline.yaml, .state files, prompt slugs).
      Any other tool that needs reactive behavior would have to duplicate all of
      that plumbing. textwatch extracts the infrastructure, makes it rule-driven,
      and lets every text- tool register its own watch rules without owning a daemon.
    supersedes:
      target: textprompts/daemon.py + textprompts/daemon CLI commands
      migration: >
        Once textwatch is stable, pp daemon commands (pp daemon start/stop/status)
        become thin wrappers that ensure textwatch is running with the pp rule set
        loaded. Eventually the embedded daemon in textprompts is removed entirely.
    architecture:
      core: >
        Single poll loop (default 2s, configurable). On each tick, evaluates all
        registered watch rules against the current filesystem state. Fires matching
        actions. Tracks seen state to avoid re-firing on unchanged files.
      rule_schema: |
        # in ~/.config/paperworlds/textwatch.yaml or per-project pipeline.yaml
        rules:
          - name: pp-state-notify
            path: ~/.config/textprompts/state/         # or glob pattern
            pattern: "*.state"
            on: [modified, created]
            action: notify
            template: "pp: {stem} → {content}"

          - name: pp-spec-trigger
            path: ~/projects/*/features/*/prompts/
            pattern: "[0-9][0-9][0-9]-*.md"
            on: [created]
            action: run
            command: "pp run --pipeline {pipeline_yaml}"

          - name: textread-remap
            path: ~/.textread/cache/
            pattern: "raw.md"
            on: [created]
            action: run
            command: "textread remap --cached {dir}"
      event_types: [created, modified, deleted]
      action_types:
        notify: macOS notification (osascript) — title + body from template
        run: shell command — runs synchronously in a subprocess, stdout to daemon log
        log: append a line to a configurable log file
      convention_sources:
        - ~/.config/paperworlds/textwatch.yaml   # global rules
        - <project>/pipeline.yaml under watch:   # per-project rules, auto-discovered
      polling_vs_events: >
        v1: polling (mirrors existing pp daemon approach, zero extra deps).
        Later: watchdog / kqueue (macOS FSEvents) as optional backend for
        lower latency and no CPU spin on idle. Toggle via config.
    migration_coupling_points: >
      The three places in textprompts/daemon.py that couple the loop to pp-specific
      concepts — extract these as pluggable callbacks and the loop becomes textwatch's
      generic core:
      coupling:
        - _build_watchers: knows about pipeline.yaml and discover_features — becomes
            a registered callback that returns (name, state_dir, slug_map) tuples.
        - notify_tick: tied to Fire() hook system — becomes a configurable action
            handler (notify, run, log) driven by rule schema.
        - discovery_tick: imports load_config / discover_features — becomes a
            discovery callback registered by pp's rule set, not baked into the core.
      result: >
        run_daemon_loop() + PID/lock/double-fork infrastructure → textwatch core.
        pp daemon becomes one YAML rule-set file that registers these three callbacks.

    pp_builtin_rules: >
      textwatch ships with a built-in pp rule set that replicates current
      textprompts daemon behavior: watch registered_paths for *.state changes
      → send macOS notification; health_tick for stale tasks; discovery_tick
      for new projects. pp daemon config (registered_paths, stale_minutes,
      poll_interval) is read by textwatch so migration is zero-config.
    textworkspace_integration:
      commands:
        - "tw watch start|stop|restart|status|log"
        - "tw watch rules [--project <path>]   # show active rule set"
        - "tw watch register <path>            # add project to watched paths"
      launchd: >
        Same pattern as textproxy: tw watch os-install drops a launchd plist
        so the daemon starts on login without manual intervention.

  - name: tw-lead-loop
    title: tw as the lead's orchestration interface — brief, audit, review, actions, hook
    priority: 1
    status: brainstorm
    date: "2026-04-18"
    description: >
      textworkspace evolves from a package manager into the lead's command center.
      Five tightly connected ideas that form a single feedback loop: orient →
      execute → trace → reflect → improve. All live as tw subcommands — no
      new repos needed (except where scale demands it later).
    loop: |
      tw brief       → orient: what's happening right now
      agents execute → using YAML-defined action specs (playbooks)
      tw audit       → trace: unified log of all agent actions
      tw review      → reflect: structured review after task / project completes
      ↑ improvements flow back to lead-profile, action specs, textwatch rules

    commands:

      tw_brief:
        description: >
          Generates a concise situational briefing for the lead or any new session.
          Aggregates open textforums threads, pending PLAN tasks across registered
          repos, recent textread bookmarks (last N days), and last session outcome.
          Output: a compact YAML or markdown snapshot — "here's where we are."
        usage:
          - "tw brief               # full snapshot"
          - "tw brief --format md   # markdown, pasteable into a prompt"
          - "tw brief --since 2d    # only activity in last 2 days"
        sources:
          - textforums list --status open
          - PLAN.yaml files in registered repos (pending tasks)
          - textread bookmarks (recent, min-stars configurable)
          - last .state files across watched projects
        note: >
          This is what you hand to a fresh session instead of re-explaining everything.
          Replaces the ad-hoc "here's what's happening" context dump.

      tw_hook:
        description: >
          Git hook installer and runner. Small enough to live as tw hook, not a
          separate repo. Drops scripts into .git/hooks/ for the current repo.
          Hooks call back into tw hook run <event> which dispatches to the right
          action. No daemon — git does the triggering.
        hooks:
          pre_commit: >
            Lint-style checks: flag risky patterns (rm -rf, force push, secrets).
            Optional: call Datadog Code Security MCP for SAST if available.
          post_commit: >
            Summarize the diff, log to tw audit (this commit, this agent/session).
            Optional: suggest commit message if none given.
          post_merge: >
            Notify relevant textforums threads if commit closes a tagged issue.
        usage:
          - "tw hook install [--hooks pre-commit,post-commit]"
          - "tw hook run <event>   # called by the installed hook scripts"
          - "tw hook status        # show installed hooks for current repo"
        note: texthook absorbed here. No separate repo.

      tw_audit:
        description: >
          Unified append-only action log across all agents and sessions.
          Every significant agent action (commit, forum post, pp run, textread)
          is logged to a single structured file. The source of truth for
          "what did agents actually do." Enables plan-vs-actual comparison
          against tw_actions playbooks.
        storage: ~/.config/paperworlds/audit.jsonl   # JSONL — one entry per line
        entry_schema: |
          {"ts": "2026-04-18T10:32:00Z", "agent": "claude@textserve-abc123",
           "session": "abc123", "repo": "textserve",
           "action": "tool-use",          # tool-use | commit | forum-post | pp-run | read
           "tool": "Edit",                # Claude Code tool name (for tool-use entries)
           "detail": {"file": "src/textserve/auth.go", "summary": "add token refresh"},
           "tags": ["textserve", "auth"]}
        collection_mechanism: >
          Claude Code PostToolUse hook — fires after every tool call.
          Hook script: tw audit append --from-hook "$CLAUDE_HOOK_PAYLOAD".
          Zero agent overhead — hook runs in background, appends JSONL line.
          Per-session files optional (tw audit --session abc123) for targeted replay.
        sources: >
          PostToolUse hook (all tool calls), tw hook post-commit, pp (task complete/blocked),
          textforums (new post), textread (--save), tw review (review complete).
          Each source appends; tw audit is the reader.
        usage:
          - "tw audit list [--repo textserve] [--since 7d] [--action commit]"
          - "tw audit tail   # live feed, like tail -f"
          - "tw audit export --format md --since 2026-04-14"
          - "tw audit diff --plan start-session --session abc123  # plan vs actual"

      tw_review:
        description: >
          Post-task and post-project reflection. Reads tw audit entries for the
          scope (task or project), runs a fresh agent to synthesize: what went
          well, what was repeated/redundant, what should change in YAML action
          specs or lead-profile. Output: a structured review YAML saved alongside
          the project logs.
        triggers:
          - 'Manual: "tw review --task <id> --project <path>"'
          - "Automatic (via textwatch rule): when all prompts in a pipeline reach DONE state, fire tw review for that pipeline."
        output_schema: |
          scope: project | task
          period: {from: ..., to: ...}
          summary: "one paragraph"
          what_worked: ["..."]
          what_to_change: ["..."]
          action_spec_suggestions: ["..."]  # concrete edits to playbooks
          lead_profile_deltas: ["..."]      # patterns observed vs profile
        usage:
          - "tw review --task 003 --project ~/projects/personal/paperworlds/textserve"
          - "tw review --project ~/projects/personal/paperworlds/textserve --since 2026-04-01"

      tw_actions:
        description: >
          YAML-defined action sequences (playbooks). Like Claude Code skills but
          concise, accessible without a conversation, and composable with other
          tw commands. Stored in ~/.config/paperworlds/actions/ as named YAML files.
          Executed by tw run <action-name>.
        why: >
          Prompts (pp) are heavyweight — a full markdown file per task. Skills
          are conversation-scoped. Playbooks fill the gap: short, named sequences
          for recurring lead workflows (start-session, post-task cleanup, daily
          standup) that any agent or human can invoke without context.
        subgraph_model: >
          An action spec is not a flat step list — it is a typed task subgraph.
          When a task is planned, the chain of steps is known, and each step maps
          to a chain of specific tool invocations. That mapping is not implicit;
          it can be made explicit in the spec. Bound to each step are two things:
          (1) permissions — what tools/actions the agent is allowed to use in
          this context (e.g. may read files, may NOT push to remote); and
          (2) recommendations — conventions and constraints that apply (e.g.
          "prefer Edit over Bash for file changes", "commit after each logical
          unit"). Together, these define the full intended subgraph of a subagent
          doing one task — not just what to do, but within what envelope.
          This model makes action specs textmap-compatible: a playbook is a
          subgraph template that can be stored as nodes+edges in the map,
          queried by tool type, and compared against what the agent actually did
          (via tw_audit) to close the plan-vs-actual loop.
        permissions_model: |
          permissions:
            allow: [Read, Edit, Write, Bash, Grep, Glob]
            restrict: [Bash push, Bash rm -rf]    # patterns, not just tool names
            require_confirm: [git push, gh pr create]
          recommendations:
            - "Prefer Edit over Bash for file changes"
            - "Commit after each logical unit — do not accumulate"
            - "Run tests before committing if tests exist"
        schema: |
          name: start-session
          description: "Orient at the start of any new work session."
          permissions:
            allow: [Read, Bash]
            restrict: []
          steps:
            - run: tw brief --format md
            - run: textforums list --status open
            - run: tw status
            - prompt: "Review the above and identify the single next action."
        step_types:
          run: shell command — output shown, appended to audit log
          prompt: natural language instruction injected into agent context
          ask: pause and request human input before continuing
          fork: run steps in parallel (named branches)
        usage:
          - "tw actions list"
          - "tw run <name>           # execute a playbook"
          - "tw actions edit <name>  # open in $EDITOR"
          - "tw actions new <name>   # scaffold a new playbook"
        builtin_actions:
          - start-session    # brief + forums + status
          - post-task        # audit commit + close forums thread if resolved
          - daily-review     # tw review --since yesterday
        relation_to_textmap: >
          Once textmap exists: a playbook can be stored as a subgraph template
          (Plan node → Step nodes → Tool nodes, with Permission and Recommendation
          edges). tw review can then query "planned tools vs actual tools" as a
          graph diff — structural divergence surfaces without parsing free text.

quality:
  - name: textbench
    title: Prompt regression testing
    priority: 5
    status: idea
    description: >
      Run the same prompt across model versions and compare outputs.
      Regression testing for prompts. Critical once textprompts is shipping
      real DAG workflows.

# Validation from the field — confirms existing tools are on the right track

validation:
  textprompts:
    - title: "Anthropic: Multi-agent coordination patterns"
      url: https://claude.com/blog/multi-agent-coordination-patterns
      takeaway: >
        Five patterns. Recommendation: start with orchestrator-subagent —
        exactly what textprompts/pp does. Evolution path toward shared state
        via textmap.
    - title: "Factory.ai: Missions architecture"
      url: https://factory.ai/news/missions-architecture
      takeaway: >
        Almost identical to pp. Orchestrator → workers → validators.
        38.8k LOC across 6 milestones in 16.5h. Key addition we lack:
        validators as a distinct agent role.

  textserve:
    - title: Datadog Code Security MCP
      url: https://www.datadoghq.com/blog/introducing-datadog-code-security-mcp/
      takeaway: MCP server as developer tool. Candidate for textserve fleet registry.
    - title: Kubernetes 2026 trends
      url: https://www.loginline.com/en/blog/2026-kubernetes-trends
      takeaway: If MCP servers move toward k8s, textserve may need to evolve beyond Docker.

  general:
    - title: OpenHarness / ohmo
      url: https://github.com/HKUDS/OpenHarness
      takeaway: >
        Open-source agent harness. Different level — they rebuild the agent loop,
        we wrap Claude Code's. Worth watching for combo execution patterns.

# ---------------------------------------------------------------------------
# COGNITIVE ARCHITECTURE — how the tools map to cognitive work
# (merged from docs/MAP.yaml)
# ---------------------------------------------------------------------------

cognitive_architecture:
  layers:
    prospective:
      name: Working memory / intent
      tool: spec (SPEC-TEMPLATE.yaml)
      holds: What to build, what's unknown before building
      note: >
        The spec's explore: section is the query interface into the cognitive
        layer — unknowns the LEAD has before requirements can be written.
        Eventually pp can auto-fill these from forums + textmap.

    episodic:
      name: Episodic memory
      tool: textforums
      holds: "Things that happened — API renames, blockers, migrations"
      storage: ~/.textforums/<slug>/thread.yaml
      lifespan: "Short — open, acted on, closed"

    semantic:
      name: Semantic / structural memory
      tool: textmap
      holds: "Things that are true — what calls what, what depends on what"
      storage: "Kuzu graph DB (prototype: graph-roadmap)"
      lifespan: "Long — persists until code changes"

    recall_engine:
      name: Recall / delivery
      tool: pp context injection (textprompts)
      holds: Pulls episodic + semantic layers together before agent starts
      note: >
        pp run queries forums + textmap, merges results, prepends a unified
        context block to the prompt. Forums-only today; textmap enriches later.

  full_loop: |
    LEAD writes spec (intent + unknowns)
           ↓
    pp run NNN
      ├─ forums query  → resolves temporal unknowns ("was X renamed?")
      ├─ textmap query → resolves structural unknowns ("does X exist?")
      └─ remaining     → spawn discovery agent (mode: explore)
           ↓
    LEAD reviews answers, hardens requirements + design
           ↓
    implement agent executes against locked spec

  cognee_mapping:
    remember: agent posts forum thread OR textmap auto-detects a change
    recall: pp queries forums + graph before spawning worker
    forget: textforums close — thread resolved, no longer injected
    improve: graph annotations refined over time; forum threads enriched by later agents

  current_status:
    working: [textforums, spec_format]
    prototype: [textmap]
    planned: [pp_context_injection]
    gap: >
      pp context injection is the next step that makes the cognitive loop
      pay off. Until then, agents rely on discipline (read-on-start convention)
      rather than automatic delivery.

# ---------------------------------------------------------------------------
# FORUMS + TEXTMAP INTEGRATION SPEC
# (merged from docs/FORUMS-AGENT-SPEC.md — the detailed implementation plan)
# ---------------------------------------------------------------------------

forums_textmap_spec:
  status: draft
  date: "2026-04-14"

  problem: >
    Agents work in isolation. Cross-repo blockers are logged but not shared.
    No awareness of structural relationships between repos.

  goal: >
    Give every agent automatic, pre-task context from forums (temporal) and
    textmap (structural). Three properties: discovery, delivery, feedback.

  boundary:
    textforums: "Temporal coordination — things happening now"
    textmap: "Structural knowledge — things that are true"
    overlap: >
      Both feed pp context injection. The agent sees one context block.
    reinforcement:
      - "Forums feed the graph: a rename thread is semantically a graph edge."
      - "Graph sharpens forum relevance: only inject threads about symbols the prompt touches."
      - "Graph detects what forums miss: deleted function → auto-flag even with no thread."

  unified_injection: |
    pp run 003
      ├─ read prompt frontmatter → repo: textsessions
      ├─ FORUMS: textforums list --tag textsessions --status open
      ├─ GRAPH: textmap query --repo textsessions --scope prompt-003
      ├─ MERGE + DEDUPLICATE (forum wording wins, graph adds "Affects:" line)
      └─ format as unified context block, spawn worker

  merge_rules:
    - "Same change (matched by symbol/commit) → merge, forum wording wins, graph adds Affects:"
    - "Forum only → inject as-is"
    - "Graph only → auto-summary: 'textmap detected: {description}'"
    - "Deduplicate by symbol"

  phasing:
    now: "pp queries forums only"
    next: "pp queries forums + textmap, agents see merged context"
    later: "textmap auto-generates forum threads for detected breakage"

  forums_layers:
    layer_1_tags:
      description: "Every thread MUST have ≥1 repo tag"
      additional: [prompt ID, category (blocker/info/question)]
      status: convention

    layer_2_injection:
      description: "pp run prepends open forum threads to prompt context"
      filtering:
        - "Default: threads tagged with prompt's repo: field"
        - "Blocker threads always injected (highlighted)"
        - "Info threads injected but quieter"
        - "Resolved threads never injected"
      status: planned

    layer_3_write_on_block:
      description: >
        Agent hits cross-repo dependency → post forum thread, log slug,
        set state BLOCKED. Enforced via prompt template.
      status: convention

    layer_4_post_task_scan:
      description: >
        After worker completes, pp checks for new threads created during
        the run. Logs and notifies lead.
      status: planned

    layer_5_forums_as_dependency:
      description: >
        Thread tagged blocks:<prompt-id> prevents that prompt from running.
        Thread must be closed before pp will spawn the worker.
      status: planned

  textmap_prototype:
    location: graph-roadmap
    current: "Kuzu graph, Node/Edge tables, graphk CLI, graph_mcp MCP server"
    needed:
      - "Code-level nodes and edges (functions, modules, imports)"
      - "Repo-scoped queries (what in X affects Y)"
      - "Change detection (diff code state vs graph)"
      - "Query interface for pp (shell out to graphk CLI)"

  implementation_phases:
    - phase: 1
      what: Tag convention docs
      where: textforums, CONVENTIONS
      effort: low
    - phase: 2
      what: pp context injection (forums only)
      where: textprompts
      effort: medium
    - phase: 3
      what: Write-on-block prompt template
      where: textprompts/prompts
      effort: low
    - phase: 4
      what: pp post-task scan
      where: textprompts
      effort: medium
    - phase: 5
      what: Forums as dependency
      where: textprompts
      effort: medium
    - phase: 6
      what: Code-level nodes in graph
      where: graph-roadmap
      effort: medium
    - phase: 7
      what: graphk query in pp injection
      where: textprompts, graph-roadmap
      effort: medium
    - phase: 8
      what: Merge/dedup logic
      where: textprompts
      effort: medium
    - phase: 9
      what: textmap auto-posts forum threads
      where: graph-roadmap, textforums
      effort: high

  open_questions:
    - "Should textforums new require --tag or just warn?"
    - "Full thread or latest entry in injection? (Latest + count, with show pointer)"
    - "Resolved thread trace for N days? (Probably not — skip v1)"
    - "pp calls graphk CLI (decoupled). If not on PATH, skip silently."
    - "textmap auto-generated threads: author = @textmap"
    - "Merge heuristics: start with exact symbol match only"
    - "Code-level nodes: same Kuzu DB, different node types"
    - "graph-sync --from-code: start with Python AST parsing"

# ---------------------------------------------------------------------------
# REPO SEPARATION — what needs its own repo vs lives in textworkspace
# (decided 2026-04-18)
# ---------------------------------------------------------------------------

textmap_population:
  status: planning
  date: "2026-04-19"
  priority: next
  title: Populate the graph — sources, schema extensions, ingestion pipeline
  summary: >
    The graph (graph-roadmap prototype) has a working schema, Kuzu backend, and
    graph-sync.py. What it lacks is ingestion from the real data sources that
    already exist. This is the plan to make the graph useful from day one and
    unlock the open-source release.

  schema_extensions: >
    The graph-roadmap.md schema (system, initiative, goal, problem, team,
    decision, external) covers structural knowledge. Two node types are missing
    and must be added before ingestion:

    - protocol: a named, executable procedure for a specific action (commit, PR,
        branch naming, review). Derived from skills/rules/*.mdc. Fields: name,
        action_type, trigger_context, constraints[]. This is what the action spec
        subgraph model builds on — a protocol is a queryable playbook template.

    - intent: an action/question that maps to a specific tool, skill, agent, or
        command. Derived from skills/claude-code/memory/toolmap.yaml which is already
        graph-shaped (intent → tool/skill/agent). Fields: description, maps_to (ref),
        tool_type (mcp|bash|agent|skill), notes.

  data_sources:
    - source: skills/claude-code/memory/toolmap.yaml
      type: structured YAML
      produces: Intent nodes + Tool/Skill/Agent edges
      priority: 1
      why: >
        Already graph-shaped. Maps intent → tool/skill/agent/command across
        observability, databases, comms, CI/CD, kubernetes, security, paradex,
        git workflow. Also contains repos list (Repo nodes) and cluster_mapping
        (Env → Cluster → Workspace edges). Highest signal-to-effort ratio.

    - source: mcpf/toolmap-tags.yaml
      path: ~/.local/mcpf/toolmap-tags.yaml
      type: structured YAML
      produces: Domain→MCPServer edges (enriches Intent nodes)
      priority: 1
      why: >
        Maps conceptual domains (snowflake, grafana, docker) to mcpf server tags.
        Completes the Intent→Tool edge by adding which MCP server handles it.
        Small file, direct import.

    - source: ~/.textforums/*/thread.yaml (status=decided)
      type: structured YAML
      produces: Decision nodes (per-repo ADR-lite)
      priority: 2
      why: >
        textforums threads promoted via `textforums decide` are canonical
        per-repo decisions — summary, decided_at, decided_by, plus the
        discussion body. They fit the decision type directly. context.repos
        gives the `applies_to` edges; `superseded-by` links produce
        supersedes edges in the graph. Ingest only status=decided to
        avoid churn from in-flight threads. Added 2026-04-24 with
        textworkspace 0.11.0.

    - source: skills/rules/*.mdc
      type: semi-structured Markdown with YAML frontmatter
      produces: Protocol nodes
      priority: 2
      why: >
        Each .mdc file is a named rule with trigger context and constraints.
        commit-and-pr-conventions.mdc, git-branch-naming.mdc, containers-first.mdc,
        dev-workflow.mdc, etc. — these are the protocols an agent must follow.
        Parsing: read frontmatter (description, alwaysApply) + body as constraint text.
        Links to Workspace nodes (work, personal) via trigger_context.

    - source: skills/workspace/projects/*.md
      type: narrative Markdown
      produces: Initiative nodes (matches graph-roadmap initiative type)
      priority: 2
      why: >
        paperworlds.md, graph-roadmap.md, graph-mcp.md, pp-scaffold.md etc.
        Each file is an initiative with motivation, status, and connections to
        systems. Parse: H1 as name, H2 sections as fields, links between projects
        as `motivated_by` or `part_of` edges.

    - source: skills/claude-code/memory/feedback_*.md
      type: "typed Markdown (frontmatter: type, name, description)"
      produces: Constraint nodes (extends decision type — learned behavioral rules)
      priority: 3
      why: >
        ~60 feedback files encoding what worked and what not to do. Each is a
        proven constraint on agent behavior — effectively ADRs for how to work.
        These populate the Recommendation edges in action specs. Parse frontmatter,
        body becomes constraint.description.

    - source: skills/workspace/IDENTITY.md + SOUL.md + TOOLS.md
      type: structured Markdown
      produces: 'Owner node (type: team, singleton — "Paolo")'
      priority: 3
      why: >
        Defines roles, decision authority, stack. Single Owner node with
        `owns` edges to all repos and initiatives. Also source of permitted/
        restricted actions (decision authority table → permission edges).

    - source: skills/claude-code/agents/*.md
      type: structured Markdown
      produces: "Agent nodes (type: system, subtype: agent)"
      priority: 3
      why: >
        pr-reviewer, go-vuln-fix, snowflake-cost, wrap-it-up, etc.
        Each agent is a system node with `uses` edges to its required tools.
        Enables graph query: "what agent handles intent X?"

    - source: mono git history (paradigm/mono log)
      type: unstructured (git log)
      produces: "Decision nodes (type: decision — ADR-light from commit messages)"
      priority: 4
      why: >
        Historical decisions embedded in commit messages and PR descriptions.
        Lower priority — requires extraction heuristic. Worth doing once the
        rest of the graph has enough nodes to link decisions against.

  ingestion_command: >
    textmap sync — idempotent, runs all ingestors in priority order.
    Each source has a dedicated ingestor (Python module in graph-roadmap repo).
    Uses MERGE not INSERT — safe to run repeatedly.
    Logs what was added/updated/skipped per run.

    textmap sync --source toolmap       # single source
    textmap sync --dry-run              # show what would change
    textmap sync --all                  # full population (default)

  ingestor_architecture:
    pattern: >
      Each source type gets one ingestor class implementing:
        parse(path) -> list[Node | Edge]
        upsert(nodes, edges, conn: kuzu.Connection)
      Shared infrastructure: YAML frontmatter parser, Markdown section extractor,
      slug generator (human-readable, from name/path), Kuzu MERGE wrapper.
    location: graph-roadmap repo as textmap/ingestors/

  open_source_scope: >
    What ships as open-source textmap:
    - Schema (node + edge types, including new protocol + intent types)
    - Kuzu sync infrastructure (graph-sync.py evolved into textmap sync)
    - Ingestor framework + reference ingestors (toolmap.yaml reader, .mdc reader)
    - graphk/graph-query CLI (query layer)
    - graph_mcp MCP server
    What stays private:
    - The actual data files (toolmap.yaml, skills/, memory/)
    - Personal graph.yaml content
    Users run textmap sync against their own skills/memory directories.

  open_questions:
    - >
      Multi-workspace: toolmap.yaml today covers work (paradigm). Personal workspace
      (paperworlds) lives in CONVENTIONS.yaml. Should both be in one graph or
      separate Kuzu databases? Leaning: same DB, Workspace nodes as scope filter.
    - >
      Schema versioning: when a node type gains a new field, how does sync handle
      existing nodes? Kuzu ALTER TABLE or full rebuild? Leaning: rebuild on schema change.
    - >
      Protocol node linking: rules/*.mdc files have `alwaysApply: true` or path globs.
      How does "applies to repo X" get encoded? Option: Protocol -[APPLIES_TO]-> Repo
      where Repo has workspace/path metadata.
    - >
      Feedback files are personal lessons, not universal rules. Should they be
      in the graph at all, or stay as memory-only? Leaning: in graph, tagged
      `personal`, excluded from open-source seed data.

repo_decisions:
  separate_repos:
    - name: textread
      reason: different deps (newspaper4k, anthropic SDK), standalone CLI
      status: scaffolded, prompts ready
    - name: textmap
      reason: Go + Kuzu, different language
      status: prototype at graph-roadmap
    - name: textserve
      reason: Go binary, MCP fleet management
      status: open-sourcing in progress
    - name: textcombos
      reason: community YAML repo (config files, not a tool)
      status: not created yet
    - name: textwatch
      reason: standalone daemon, absorbs pp daemon
      status: brainstorm
      dependency: textprompts must ship first (refactored, open-sourced)

  lives_in_textworkspace:
    - name: tw hook
      absorbed: texthook
      reason: small, git hooks are just scripts installed by tw
    - name: tw brief
      reason: aggregates signals from existing tw-managed tools
    - name: tw audit
      reason: unified log, reads from all tw-managed tools
    - name: tw review
      reason: post-task reflection, reads audit log
    - name: tw actions
      reason: YAML playbooks executed by tw run

  lives_in_textprompts:
    - name: textbench
      as: pp bench
      reason: tests prompts, which is textprompts' domain
