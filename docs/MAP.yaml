# ---------------------------------------------------------------------------
# Paperworlds — Cognitive Stack Map
#
# How the tools in the stack map to cognitive work concepts:
# specs (intent), forums (episodic), textmap (semantic), pp (recall engine).
# ---------------------------------------------------------------------------

cognitive_layers:
  prospective:
    name: "Working memory / intent"
    tool: "spec (SPEC-TEMPLATE.yaml)"
    holds: "What to build, what's unknown before building"
    cognee_concept: "session context"
    note: >
      The spec's explore: section is the query interface into the cognitive
      layer — unknowns the LEAD has before requirements can be written.
      Eventually pp can auto-fill these from forums + textmap.

  episodic:
    name: "Episodic memory"
    tool: textforums
    holds: "Things that happened — API renames, blockers, migrations"
    cognee_concept: "Remember / Recall (temporal)"
    storage: "~/.textforums/<slug>/thread.yaml"
    lifespan: "Short — open, acted on, closed"
    example: "'load_sessions renamed to list_sessions in v0.4'"

  semantic:
    name: "Semantic / structural memory"
    tool: textmap  # prototype: graph-roadmap (Kuzu-backed)
    holds: "Things that are true — what calls what, what depends on what"
    cognee_concept: "Knowledge graph"
    storage: "Kuzu graph DB (graph-roadmap)"
    lifespan: "Long — persists until code changes"
    example: "'tw.status imports textsessions.load_sessions'"

  recall_engine:
    name: "Recall / delivery"
    tool: "pp context injection (paperagents)"
    holds: "Pulls episodic + semantic layers together before agent starts"
    cognee_concept: "Recall"
    note: >
      pp run queries forums + textmap, merges results, and prepends a
      unified context block to the prompt. The agent sees one block, not
      two systems. Forums-only is available today; textmap enriches later.

full_loop: |
  LEAD writes spec (intent + unknowns)
         ↓
  pp run NNN
    ├─ forums query  → resolves temporal unknowns ("was X renamed?")
    ├─ textmap query → resolves structural unknowns ("does X exist?")
    └─ remaining unknowns → spawn discovery agent (mode: explore)
         ↓
  LEAD reviews answers, hardens requirements + design
         ↓
  implement agent executes against locked spec

cognee_mapping:
  remember: "agent posts forum thread OR textmap auto-detects a change"
  recall:   "pp queries forums + graph before spawning worker"
  forget:   "textforums close — thread resolved, no longer injected"
  improve:  "graph annotations refined over time; forum threads enriched by later agents"

relationship_to_spec_format:
  spec: "prospective memory — defines intent and unknowns"
  explore_section: "query interface into cognitive layer — what to resolve before implementing"
  checkpoint: "gate where LEAD crystallises agent findings into deterministic spec"
  mode_explore: "agents are scaffolding — investigate and propose, do not implement"
  mode_implement: "agents execute — follow spec exactly, no latitude"

current_status:
  working: [textforums, spec_format]
  prototype: [textmap]   # graph-roadmap: Kuzu DB, code-level nodes not yet populated
  planned: [pp_context_injection]  # forums-only first, textmap enrichment later
  gap: >
    pp context injection (phase 2 in FORUMS-AGENT-SPEC) is the next step that
    makes the cognitive loop pay off. Until then, agents rely on discipline
    (read-on-start convention) rather than automatic delivery.

references:
  - file: docs/FORUMS-AGENT-SPEC.md
    note: "Full spec for forums + textmap integration and pp injection model"
  - file: docs/SPEC-TEMPLATE.yaml
    note: "Canonical spec format — explore/implement phases, EARS requirements"
  - file: prompts/010-workspace-profiles.yaml
    note: "Worked example with explore: unknowns filled in"
  - repo: graph-roadmap
    path: /Users/projects/personal/graph-roadmap
    note: "textmap prototype — Kuzu graph, graphk CLI, graph_mcp server"
