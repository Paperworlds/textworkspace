      - Wire to repo_import.py orchestrator
      - Print summary line at the end

      Reuse detect_installed_tools() from doctor.py for --all.
    check:
      - "WHEN tw repo import textsessions is run, THE SYSTEM SHALL invoke `textsessions repos` as a subprocess"
      - "WHEN two imports resolve to the same path, THE SYSTEM SHALL show one merged entry and prompt for canonical name"
      - "WHEN an imported name matches an existing repo, THE SYSTEM SHALL prompt keep/rename/skip"
      - "WHEN the tool exits with code 2, THE SYSTEM SHALL skip it silently"

