    do: |
      In workspace.py:
      1. Remove _mcpf_args() helper.
      2. Add _textserve_bin() -> Optional[str]: checks shutil.which("textserve") then BIN_DIR/textserve.
      3. In start(): replace mcpf block with textserve block per design.sequence.workspace_start_with_textserve.
      4. In stop(): replace mcpf block with textserve block per design.sequence.workspace_stop_with_textserve.
